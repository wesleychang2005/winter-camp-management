<style>
  :root{
    --teal:#14b8a6; --teal-soft:#ccfbf1; --teal-line:#5eead4; --teal-ink:#0d9488;
    --purple:#8b5cf6; --purple-soft:#ede9fe;
    --blue:#3b82f6; --blue-soft:#dbeafe;
    --green:#22c55e; --green-soft:#dcfce7;
    --amber:#f59e0b; --amber-soft:#fef3c7;
    --rose:#f43f5e; --rose-soft:#ffe4e6;
    --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; --bg:#f8fafc; --card:#ffffff;
    --radius:16px;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Pretendard','Malgun Gothic','Apple SD Gothic Neo',system-ui,sans-serif;
    color:var(--ink);background:var(--bg);font-size:14px;line-height:1.55;}
  button{font-family:inherit;cursor:pointer;}
  a{color:var(--teal-ink);}

  /* Top bar */
  .top{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--line);}
  .top-in{max-width:1120px;margin:0 auto;padding:12px 22px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
  .logo{font-size:17px;font-weight:800;letter-spacing:-.3px;}
  .logo small{display:block;font-size:11px;font-weight:600;color:var(--muted);letter-spacing:0;}
  .who{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:12px;color:var(--muted);}
  .who select{padding:6px 9px;border:1px solid var(--line);border-radius:9px;font-size:12px;background:var(--bg);}
  .camp-sel{padding:6px 9px;border:1px solid var(--line);border-radius:9px;font-size:12px;background:var(--bg);font-weight:700;cursor:pointer;}
  .camp-sel:focus{border-color:var(--teal);}
  .nav{max-width:1120px;margin:0 auto;padding:0 22px;display:flex;gap:4px;}
  .nav button{border:none;background:none;padding:11px 15px 13px;font-size:13.5px;font-weight:700;color:var(--muted);
    border-bottom:2.5px solid transparent;}
  .nav button.active{color:var(--teal-ink);border-bottom-color:var(--teal);}

  .ctxbar{max-width:1120px;margin:0 auto;padding:12px 22px 0;display:flex;gap:12px;align-items:center;flex-wrap:wrap;}

  .sub{color:var(--muted);font-size:13px;margin-bottom:16px;}

  /* Cards grid */
  .cards{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}

  .mh{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;}

  .mb{padding:18px 20px;}
  .mf{padding:14px 20px 18px;display:flex;justify-content:flex-end;gap:9px;flex-wrap:wrap;}

   3. The app will automatically use Firestore instead of localStorage

   ============================================================ */

const COLLECTIONS = ['camps','teachers','campTeachers','classes','students','enrollments','lessonPlans','observations'];

// ── localStorage Backend (offline / development) ──
const KEY='camp:data:v2';
const LocalStorageBackend = {
  load(){ try{ const r=localStorage.getItem(KEY); return r?JSON.parse(r):null; }catch(e){ return window.__mem||null; } },
  save(d){ try{ localStorage.setItem(KEY, JSON.stringify(d)); }catch(e){ window.__mem=d; } },
  isFirebase: false
};

// ── Firebase Firestore Backend ──
let db = null;
const FirebaseBackend = {
  isFirebase: true,
  async init(){
    const app = firebase.apps.length ? firebase.app() : firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    // Disabled persistence to prevent hanging in iframes/incognito
    // try { await db.enablePersistence({synchronizeTabs:true}); } catch(e){ console.warn('Persistence failed:',e); }
  },
  async loadAsync(){
    const data = {};
    for(const col of COLLECTIONS){
      const snap = await db.collection(col).get();
      data[col] = snap.docs.map(d => ({id:d.id,...d.data()}));
    }
    return data;
  },
  async saveCollection(colName, items){
    const batch = db.batch();
    // Get existing docs
    const existing = await db.collection(colName).get();
    const existingIds = new Set(existing.docs.map(d=>d.id));
    const newIds = new Set(items.map(i=>i.id));
    // Delete removed docs
    existing.docs.forEach(d=>{ if(!newIds.has(d.id)) batch.delete(d.ref); });
    // Upsert current docs
    items.forEach(item=>{
      const {id,...fields} = item;
      const ref = db.collection(colName).doc(id);
      batch.set(ref, fields, {merge:true});
    });
    await batch.commit();
  },
  async saveAll(data){
    const promises = COLLECTIONS.map(col => {
      if(data[col]) return this.saveCollection(col, data[col]);
    });
    await Promise.all(promises);
  },
  // Synchronous wrappers used by the app's save() function
  load(){ return window.__firebaseData || null; },
  save(d){ 
    window.__firebaseData = d;
    // Debounce writes to Firestore
    clearTimeout(this._saveTimer);
    this._saveTimer = setTimeout(()=> this.saveAll(d).catch(e=>console.error('Firebase save error:',e)), 500);
  }
};

// ── Select backend ──
const BACKEND = FIREBASE_CONFIG ? FirebaseBackend : LocalStorageBackend;
/* ▲▲▲ END Backend Adapter ▲▲▲ */

const initial=n=>(n||'?').trim().charAt(0).toUpperCase();
const getAge=s=>s.birthYear?new Date().getFullYear()-s.birthYear:s.age||'';

/* ---- date helper: derives date from a camp's start_date ---- */
function dateOf(startDate,week,dayKey){
  const di=DAYS.findIndex(d=>d[0]===dayKey);
  const base=new Date(startDate+'T00:00:00');
  base.setDate(base.getDate()+(week-1)*7+di);
  return base.toISOString().slice(0,10);
}

const cls=id=>DATA.classes.find(c=>c.id===id);
const stu=id=>DATA.students.find(s=>s.id===id);
const teacher=id=>DATA.teachers.find(t=>t.id===id);
const tname=id=>{const t=teacher(id);return t?t.name:'—';};
function enrolledIn(classId,week){ return campEnrollments().filter(e=>e.classId===classId&&e.week===week).map(e=>e.studentId); }
function studentEnrollments(sid,campOnly){ 
  const src=campOnly?campEnrollments():DATA.enrollments;
  return src.filter(e=>e.studentId===sid).sort((a,b)=>a.week-b.week); 
}
function findLP(classId,week,day){ return campLPs().find(l=>l.classId===classId&&l.week===week&&l.day===day); }
function findObs(classId,week,day,sid){ return DATA.observations.find(o=>o.classId===classId&&o.week===week&&o.day===day&&o.studentId===sid); }
function classOfStudentWeek(sid,week){ const e=campEnrollments().find(x=>x.studentId===sid&&x.week===week); return e?e.classId:null; }
function paidOfStudentWeek(sid,week){ const e=campEnrollments().find(x=>x.studentId===sid&&x.week===week); return e?e.paid:false; }
function consecutiveWeeks(sid){
  const wks=[...new Set(studentEnrollments(sid,true).map(e=>e.week))].sort((a,b)=>a-b);
  if(!wks.length) return 0;
  let best=1,run=1;
  for(let i=1;i<wks.length;i++){ if(wks[i]===wks[i-1]+1){run++;best=Math.max(best,run);} else run=1; }
  return best;
}
function campWeeks(){ return camp()?camp().weeks:6; }
function campStart(){ return camp()?camp().startDate:'2026-07-06'; }

      h+='<div class="enr-row"><span class="wk">'+esc(cmp?cmp.label:'')+' · Week '+e.week+'</span> · '+esc(c?c.name:'?')
        +' <span class="'+(e.paid?'b-done':'b-plan')+' badge">'+(e.paid?'Paid':'Free')+'</span></div>';
    });
    h+='</div>';
  }
  h+='</div></div>';

  // Observation History (All camps)
  h+='<div class="panel"><div class="ph"><h3>Observation History</h3></div><div class="pb">';
  const allObs=DATA.observations.filter(o=>o.studentId===s.id);
  if(!allObs.length) h+='<div class="muted small">No observations recorded yet.</div>';
  else{
    const grouped = {};
    allObs.forEach(o=>{
      const c=cls(o.classId); const campId=c?c.campId:'';
      if(!grouped[campId]) grouped[campId]={};
      if(!grouped[campId][o.week]) grouped[campId][o.week]=[];
      grouped[campId][o.week].push(o);
    });
    Object.keys(grouped).forEach(campId => {
       const cmp = DATA.camps.find(c=>c.id===campId);
       const weeks = Object.keys(grouped[campId]).sort((a,b)=>a-b);
       weeks.forEach(w => {
         const obs = grouped[campId][w];
         const classId = obs[0].classId;
         const sd = cmp ? cmp.startDate : '2026-07-06';
         const dayObs=DAYS.map(d=>({d,o:obs.find(o=>o.day===d[0])})).filter(x=>x.o&&(x.o.freeComment||x.o.objectiveComment||x.o.activityComment));
         const domId = 'ow_'+campId+'_'+w;
         h+='<div class="obs-week" id="'+domId+'"><div class="obs-week-h" onclick="document.getElementById(\''+domId+'\').classList.toggle(\'open\')">'
           +'<span>'+esc(cmp?cmp.label:'')+' · Week '+w+' · '+esc(cls(classId)?cls(classId).name:'')+'</span><span class="muted small">'+dayObs.length+' days logged ▾</span></div><div class="obs-week-b">';
         if(!dayObs.length) h+='<div class="muted small" style="padding:8px 0">No records for this week</div>';
         dayObs.forEach(x=>{
           h+='<div class="obs-day"><div class="dd">'+dayLabel(x.d[0])+' <span class="muted small" style="font-weight:400">'+dateOf(sd,w,x.d[0])+' · '+esc(tname(x.o.authorId))+'</span></div>';
           if(x.o.objectiveComment) h+='<div class="cm"><span class="lab">Objective</span>'+esc(x.o.objectiveComment)+'</div>';
           if(x.o.activityComment) h+='<div class="cm"><span class="lab">Activity</span>'+esc(x.o.activityComment)+'</div>';
           if(x.o.freeComment) h+='<div class="cm"><span class="lab">Free</span>'+esc(x.o.freeComment)+'</div>';
           h+='</div>';
         });
         h+='</div></div>';
       });
    });
  }
  h+='</div></div>';
  return h;
}

function saveStudent(id){
  const name=val('f_name').trim(); if(!name){alert('Please enter a name.');return;}

    siblings:val('f_sib'),photoUrl:val('f_photo')};

    likes:val('f_likes'),dislikes:val('f_dislikes'),memo:val('f_memo')};
  if(id){ 
    Object.assign(stu(id),obj); 
    if(!stu(id).campProfiles) stu(id).campProfiles={};

  }

    DATA.students.push(obj); selStudent=obj.id;

      +'</div></div>';
  }
  return h;
}
function pickReport(sid){ reportSel=sid; customPrompt=null; render(); if(sid)setTimeout(()=>{const e=document.getElementById('rp_full');if(e)e.scrollIntoView({behavior:'smooth',block:'center'});},50); }
function setEmph(e){ emphasis=e; customPrompt=null; render(); }

function buildReportBundle(s){
  const week=ctx.week; const c=cls(classOfStudentWeek(s.id,week));
  let d='── Instructions ──\n'+currentPrompt()+'\n\n── Observation Data ──\n';
  d+='Student: '+s.name+' ('+getAge(s)+' yrs / '+s.gender+')';
  if(s.personality) d+=' · Personality: '+s.personality;
  d+='\n';
  if(s.likes||s.dislikes) d+='Likes: '+(s.likes||'—')+' / Dislikes: '+(s.dislikes||'—')+'\n';
  if(s.parentDisposition) d+='Parent Disposition: '+s.parentDisposition+'\n';
  d+='Camp: '+camp().label+'\n';
  d+='Class: '+(c?c.name:'?')+' · Week '+week+(consecutiveWeeks(s.id)>1?' ('+consecutiveWeeks(s.id)+' consecutive weeks)':'')+'\n\n';
  let any=false;
  DAYS.forEach(dd=>{
    const lp=findLP(c?c.id:null,week,dd[0]);
    const o=findObs(c?c.id:null,week,dd[0],s.id);
    if(!lp&&!o) return;
    any=true;
    d+='■ '+dd[1];
    if(lp&&lp.date) d+=' ('+lp.date+')';
    d+='\n';
    if(lp){
      if(lp.content) d+='  · Lesson Content: '+lp.content+'\n';
      if(lp.objective) d+='  · Learning Objective: '+lp.objective+'\n';
      if(lp.activities) d+='  · Learning Activities: '+lp.activities+'\n';
    }
    if(o){
      if(o.objectiveComment) d+='  · [Objective Comment] '+o.objectiveComment+'\n';
      if(o.activityComment) d+='  · [Activity Comment] '+o.activityComment+'\n';
      if(o.freeComment) d+='  · [Free Comment] '+o.freeComment+'\n';
    }
    d+='\n';
  });
  if(!any) d+='(No records for this week yet.)\n';
  return d;
}
function copyBundle(){
  const t=document.getElementById('rp_full'); t.focus(); t.select();
  let ok=false; try{ok=document.execCommand('copy');}catch(e){}
  if(!ok && navigator.clipboard){ navigator.clipboard.writeText(t.value).then(()=>toast('Copied! Paste into your AI tool.')).catch(()=>toast('Copy failed. Please select and copy manually.')); return; }
  toast(ok?'Copied! Paste into your AI tool.':'Copy failed. Please select and copy manually.');
}

function viewStats(){
  let h='<h2 class="page">Statistics</h2><div class="sub">Total student count by camp and by year.</div>';
  
  // Group counts by year and camp

  DATA.camps.forEach(c => {
    if(!countsByYear[c.year]) countsByYear[c.year]=[];
    const enrolledIds = new Set(DATA.enrollments.filter(e=>e.campId===c.id).map(e=>e.studentId));
    const numStudents = [...enrolledIds].length;
    countsByYear[c.year].push({camp:c, count:numStudents});
  });

  h+='<div class="panel"><div class="pb">';
  const years = Object.keys(countsByYear).sort((a,b)=>b-a);

    years.forEach(y => {
      h+='<h3 style="margin:20px 0 10px;border-bottom:1px solid var(--line);padding-bottom:5px">'+y+'</h3>';

  openModal(
    '<div class="mh"><h3>'+esc(cp.label)+' Students</h3><button class="x" onclick="closeModal()">×</button></div>'
    +'<div class="mb" style="max-height:60vh;overflow-y:auto">'+rows+'</div>'
    +'<div class="mf"><button class="btn" onclick="closeModal()">Close</button></div>'
  );
}

/* ============ ⑦ Camps Management ============ */
function viewCamps(){
  let h='<h2 class="page">Camp Management</h2>'
    +'<div class="sub">Create and manage camps across years and seasons. Switch between camps using the dropdown above.</div>'
    +'<div style="display:flex;gap:10px;margin-bottom:16px">'
    +'<button class="btn primary" onclick="openCampForm()">＋ New Camp</button>'
    +'<button class="btn" onclick="openDuplicateForm()">📋 Duplicate Current Camp</button>'
    +'<button class="btn" onclick="openTeacherManager()">👤 Manage Teachers</button>'
    +'</div>';

  // Camp list
  DATA.camps.sort((a,b)=>b.year-a.year||a.season.localeCompare(b.season)).forEach(c=>{
    const numClasses=DATA.classes.filter(x=>x.campId===c.id).length;
    const numEnr=DATA.enrollments.filter(x=>x.campId===c.id).length;
    const icon=SEASONS[c.season]||'📅';
    h+='<div class="camp-card '+(c.id===activeCampId?'active-camp':'')+'" onclick="switchCamp(\''+c.id+'\')">'
      +'<div class="camp-icon '+c.season+'">'+icon+'</div>'
      +'<div class="camp-meta"><h3>'+esc(c.label)
        +(c.id===activeCampId?' <span class="badge b-done">Active</span>':'')
        +(c.isActive===false?' <span class="badge b-archive">Archived</span>':'')
      +'</h3>'
      +'<div class="det">'+c.weeks+' weeks · Starts '+c.startDate+' · '+numClasses+' classes · '+numEnr+' enrollments</div></div>'
      +'<div style="display:flex;gap:6px;flex-shrink:0" onclick="event.stopPropagation()">'
        +'<button class="btn sm" onclick="openCampForm(\''+c.id+'\')">Edit</button>'
        +'<button class="btn sm" onclick="openCampClasses(\''+c.id+'\')">Classes</button>'
      +'</div>'
    +'</div>';
  });
  return h;
}

/* ============ Teacher Management ============ */
function openTeacherManager(){
  let rows = '';
  if (!DATA.teachers.length) rows = '<div class="muted small">No teachers registered yet.</div>';
  else DATA.teachers.forEach(t => {
    rows += '<div class="enr-row">'
      + '<span style="flex:1"><b>' + esc(t.name) + '</b> <span class="muted small">(' + esc(t.loginEmail || 'no email') + ')</span></span>'
      + '<button class="btn sm" onclick="openTeacherForm(\'' + t.id + '\')">Edit</button>'
      + '</div>';
  });
  
  openModal(
    '<div class="mh"><h3>Teacher Roster</h3><button class="x" onclick="closeModal()">×</button></div>'
    + '<div class="mb" id="teacherListModal">' + rows + '</div>'
    + '<div class="mf"><button class="btn" onclick="closeModal()">Close</button>'
    + '<button class="btn primary" onclick="openTeacherForm()">＋ Add Teacher</button></div>'
  , true);
}

function openTeacherForm(id){
  const t = id ? DATA.teachers.find(x => x.id === id) : {};
  openModal(
    '<div class="mh"><h3>' + (id ? 'Edit Teacher' : 'Add Teacher') + '</h3><button class="x" onclick="closeModal()">×</button></div>'
    + '<div class="mb">'
    + '<div class="fld"><label class="fl">Name *</label><input type="text" id="tf_name" value="' + esc(t.name || '') + '"></div>'
    + '<div class="fld"><label class="fl">Login Email *</label><input type="email" id="tf_email" value="' + esc(t.loginEmail || '') + '" placeholder="e.g. teacher@example.com"></div>'
    + '</div><div class="mf"><button class="btn" onclick="openTeacherManager()">Back</button>'
    + '<button class="btn primary" onclick="saveTeacher(\'' + (id || '') + '\')">Save</button></div>'
  );
}

function saveTeacher(id){
  const name = val('tf_name').trim();
  const loginEmail = val('tf_email').trim().toLowerCase();
  if (!name || !loginEmail) { alert('Please enter name and email.'); return; }
  
  if (id) {
    const t = DATA.teachers.find(x => x.id === id);
    if (t) { t.name = name; t.loginEmail = loginEmail; }
  } else {
    DATA.teachers.push({ id: uid(), name, loginEmail, createdAt: nowISO() });
  }
  
  save('Teacher Saved');
  openTeacherManager();
}

function openCampForm(id){
  const c=id?DATA.camps.find(x=>x.id===id):{};
  openModal(
    '<div class="mh"><h3>'+(id?'Edit Camp':'New Camp')+'</h3><button class="x" onclick="closeModal()">×</button></div>'
    +'<div class="mb">'
    +'<div class="fld"><label class="fl">Camp Name *</label><input type="text" id="cf_label" value="'+esc(c.label||'')+'" placeholder="e.g. 2027 Summer Camp"></div>'
    +'<div class="fld row3">'
      +'<div><label class="fl">Year</label><input type="number" id="cf_year" value="'+(c.year||new Date().getFullYear())+'"></div>'
      +'<div><label class="fl">Season</label><select id="cf_season">'
        +'<option value="summer"'+(c.season==='summer'?' selected':'')+'>☀️ Summer</option>'
        +'<option value="winter"'+(c.season==='winter'?' selected':'')+'>❄️ Winter</option>'
        +'<option value="spring"'+(c.season==='spring'?' selected':'')+'>🌸 Spring</option>'
      +'</select></div>'
      +'<div><label class="fl">Total Weeks</label><input type="number" id="cf_weeks" value="'+(c.weeks||6)+'" min="1" max="12"></div>'
    +'</div>'
    +'<div class="fld"><label class="fl">Start Date (Monday)</label><input type="date" id="cf_start" value="'+(c.startDate||'')+'"></div>'
    +'</div><div class="mf">'
    +(id?'<button class="btn danger" onclick="archiveCamp(\''+id+'\')">Archive</button>':'')
    +'<span style="flex:1"></span>'
    +'<button class="btn" onclick="closeModal()">Cancel</button>'
    +'<button class="btn primary" onclick="saveCamp(\''+(id||'')+'\')">Save</button></div>'
  );
}
function saveCamp(id){
  const label=val('cf_label').trim(); if(!label){alert('Please enter a camp name.');return;}
  const year=parseInt(val('cf_year'))||new Date().getFullYear();
  const season=val('cf_season');
  const weeks=Math.max(1,Math.min(12,parseInt(val('cf_weeks'))||6));
  const startDate=val('cf_start');
  if(!startDate){alert('Please select a start date.');return;}
  if(id){
    const c=DATA.camps.find(x=>x.id===id);
    c.label=label; c.year=year; c.season=season; c.weeks=weeks; c.startDate=startDate;
  }else{
    const nc={id:uid(),year,season,label,weeks,startDate,isActive:true};
    DATA.camps.push(nc);
    activeCampId=nc.id;
  }
  save('Camp Saved'); closeModal(); render();
}
function archiveCamp(id){
  if(!confirm('Archive this camp? It will still be visible but marked as archived.')) return;
  const c=DATA.camps.find(x=>x.id===id);
  if(c) c.isActive=false;
  if(activeCampId===id){
    const next=DATA.camps.find(x=>x.id!==id&&x.isActive!==false);
    if(next) activeCampId=next.id;
  }
  save('Camp Archived'); closeModal(); render();
}

function openDuplicateForm(){
  const src=camp();
  const nextYear=src.season==='winter'?src.year+1:src.year+1;
  openModal(
    '<div class="mh"><h3>Duplicate Camp</h3><button class="x" onclick="closeModal()">×</button></div>'
    +'<div class="mb">'
    +'<div class="muted small" style="margin-bottom:12px">Creates a new camp by copying the class structure and teacher assignments from <b>'+esc(src.label)+'</b>. No student enrollments or observation data will be copied.</div>'
    +'<div class="fld"><label class="fl">New Camp Name *</label><input type="text" id="df_label" value="'+nextYear+' '+src.season.charAt(0).toUpperCase()+src.season.slice(1)+' Camp"></div>'
    +'<div class="fld row3">'
      +'<div><label class="fl">Year</label><input type="number" id="df_year" value="'+nextYear+'"></div>'
      +'<div><label class="fl">Season</label><select id="df_season">'
        +'<option value="summer"'+(src.season==='summer'?' selected':'')+'>☀️ Summer</option>'
        +'<option value="winter"'+(src.season==='winter'?' selected':'')+'>❄️ Winter</option>'
        +'<option value="spring"'+(src.season==='spring'?' selected':'')+'>🌸 Spring</option>'
      +'</select></div>'
      +'<div><label class="fl">Total Weeks</label><input type="number" id="df_weeks" value="'+src.weeks+'" min="1" max="12"></div>'
    +'</div>'
    +'<div class="fld"><label class="fl">Start Date (Monday)</label><input type="date" id="df_start"></div>'
    +'</div><div class="mf"><button class="btn" onclick="closeModal()">Cancel</button>'
    +'<button class="btn primary" onclick="doDuplicate()">Duplicate</button></div>'
  );
}
function doDuplicate(){
  const label=val('df_label').trim(); if(!label){alert('Please enter a name.');return;}
  const startDate=val('df_start'); if(!startDate){alert('Please select a start date.');return;}
  const year=parseInt(val('df_year'))||new Date().getFullYear();
  const season=val('df_season');
  const weeks=Math.max(1,Math.min(12,parseInt(val('df_weeks'))||6));
  const newCampId=uid();
  // Create camp
  DATA.camps.push({id:newCampId,year,season,label,weeks,startDate,isActive:true});
  // Copy classes
  const srcClasses=campClasses();
  srcClasses.forEach(c=>{
    DATA.classes.push({id:uid(),campId:newCampId,subject:c.subject,level:c.level,name:c.name,teacherId:c.teacherId,maxCapacity:c.maxCapacity||8});
  });
  // Copy camp-teacher assignments
  const srcCT=DATA.campTeachers.filter(x=>x.campId===activeCampId);
  srcCT.forEach(ct=>{
    DATA.campTeachers.push({campId:newCampId,teacherId:ct.teacherId,role:ct.role});
  });
  activeCampId=newCampId;
  save('Camp duplicated — '+srcClasses.length+' classes copied'); closeModal(); render();
}

/* ============ Camp Classes Management ============ */
function openCampClasses(campId){
  const classes=DATA.classes.filter(c=>c.campId===campId);
  const cp=DATA.camps.find(c=>c.id===campId);
  let rows='';
  if(!classes.length) rows='<div class="muted small">No classes yet.</div>';
  else classes.forEach(c=>{
    rows+='<div class="enr-row">'
      +'<span style="flex:1"><b>'+esc(c.name)+'</b> <span class="muted small">'+esc(c.subject)+' · Level '+c.level+' · Teacher: '+esc(tname(c.teacherId))+'</span></span>'
      +'<button class="btn sm" onclick="editClassInline(\''+c.id+'\')">Edit</button>'
      +'<button class="btn danger sm" onclick="deleteClass(\''+c.id+'\')">Delete</button>'
    +'</div>';
  });
  openModal(
    '<div class="mh"><h3>Classes — '+esc(cp.label)+'</h3><button class="x" onclick="closeModal()">×</button></div>'
    +'<div class="mb" id="classListModal">'+rows+'</div>'
    +'<div class="mf"><button class="btn" onclick="closeModal()">Close</button>'
    +'<button class="btn primary" onclick="openAddClass(\''+campId+'\')">＋ Add Class</button></div>'
  , true);
}

function openAddClass(campId){
  openModal(
    '<div class="mh"><h3>Add Class</h3><button class="x" onclick="closeModal()">×</button></div>'
    +'<div class="mb">'
    +'<div class="fld"><label class="fl">Class Name *</label><input type="text" id="ac_name" placeholder="e.g. Art Reading Class A"></div>'
    +'<div class="fld row3">'
      +'<div><label class="fl">Subject</label><input type="text" id="ac_subject" placeholder="e.g. Art Reading"></div>'
      +'<div><label class="fl">Level</label><select id="ac_level"><option value="A">A (Upper)</option><option value="B">B (Lower)</option></select></div>'
      +'<div><label class="fl">Max Capacity</label><input type="number" id="ac_cap" value="8" min="1"></div>'
    +'</div>'
    +'<div class="fld"><label class="fl">Teacher</label><select id="ac_teacher">'
      +DATA.teachers.map(t=>'<option value="'+t.id+'">'+esc(t.name)+'</option>').join('')+'</select></div>'
    +'</div><div class="mf"><button class="btn" onclick="if(view===\'home\'){closeModal();}else{openCampClasses(\''+campId+'\');}">Cancel</button>'
    +'<button class="btn primary" onclick="doAddClass(\''+campId+'\')">Add</button></div>'
  );
}
function doAddClass(campId){
  const name=val('ac_name').trim(); if(!name){alert('Please enter a class name.');return;}
  DATA.classes.push({id:uid(),campId,subject:val('ac_subject'),level:val('ac_level'),name,teacherId:val('ac_teacher'),maxCapacity:parseInt(val('ac_cap'))||8});
  save('Class Added');
  if(view==='home'){ closeModal(); render(); } else openCampClasses(campId);
}
function deleteClass(classId){
  if(!confirm('Delete this class? All enrollments and data in this class will be lost.')) return;
  DATA.classes=DATA.classes.filter(c=>c.id!==classId);
  DATA.enrollments=DATA.enrollments.filter(e=>e.classId!==classId);
  DATA.lessonPlans=DATA.lessonPlans.filter(l=>l.classId!==classId);
  DATA.observations=DATA.observations.filter(o=>o.classId!==classId);
  save('Class Deleted'); render(); closeModal();
}
function editClassInline(classId){
  const c=cls(classId); if(!c)return;
  openModal(
    '<div class="mh"><h3>Edit Class</h3><button class="x" onclick="closeModal()">×</button></div>'
    +'<div class="mb">'
    +'<div class="fld"><label class="fl">Class Name</label><input type="text" id="ec_name" value="'+esc(c.name)+'"></div>'
    +'<div class="fld row3">'
      +'<div><label class="fl">Subject</label><input type="text" id="ec_subject" value="'+esc(c.subject)+'"></div>'
      +'<div><label class="fl">Level</label><select id="ec_level"><option value="A"'+(c.level==='A'?' selected':'')+'>A (Upper)</option><option value="B"'+(c.level==='B'?' selected':'')+'>B (Lower)</option></select></div>'
      +'<div><label class="fl">Max Capacity</label><input type="number" id="ec_cap" value="'+(c.maxCapacity||8)+'" min="1"></div>'
    +'</div>'
    +'<div class="fld"><label class="fl">Teacher</label><select id="ec_teacher">'
      +DATA.teachers.map(t=>'<option value="'+t.id+'"'+(t.id===c.teacherId?' selected':'')+'>'+esc(t.name)+'</option>').join('')+'</select></div>'
    +'</div><div class="mf"><button class="btn" onclick="if(view===\'home\'){closeModal();}else{openCampClasses(\''+c.campId+'\');}">Cancel</button>'
    +'<button class="btn primary" onclick="doEditClass(\''+classId+'\')">Save</button></div>'
  );
}
function doEditClass(classId){
  const c=cls(classId); if(!c)return;
  c.name=val('ec_name').trim()||c.name;
  c.subject=val('ec_subject');
  c.level=val('ec_level');
  c.maxCapacity=parseInt(val('ec_cap'))||8;
  c.teacherId=val('ec_teacher');
  save('Class Updated');
  if(view==='home'){ closeModal(); render(); } else openCampClasses(c.campId);
}

/* ============ Common Modal ============ */
const ov=document.getElementById('overlay'), modalEl=document.getElementById('modal');
function openModal(html,wide){ modalEl.className='modal'+(wide?' wide':''); modalEl.innerHTML=html; ov.classList.add('show');
  const f=modalEl.querySelector('input,textarea,select'); if(f)setTimeout(()=>f.focus(),50); }
function closeModal(){ ov.classList.remove('show'); modalEl.innerHTML=''; }
ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

/* ============ Start ============ */
if(BACKEND.isFirebase){
  if (!firebase.apps.length) {
    firebase.initializeApp(FIREBASE_CONFIG);
  }
  document.getElementById('main').innerHTML='<div class="empty"><b>Authenticating...</b></div>';
  firebase.auth().onAuthStateChanged(user => {
    if (!user) {
      window.top.location.href = '/auth/signin';
      return;
    }
    window.authUserEmail = user.email;
    document.getElementById('main').innerHTML='<div class="empty"><b>Connecting to Firebase...</b></div>';
    loadDataAsync().then(()=>render()).catch(e=>{
      console.error('Firebase load error:',e);
      document.getElementById('main').innerHTML='<div class="empty"><b>Firebase connection failed</b><br>'+e.message+'<br><br><button class="btn primary" onclick="location.reload()">Retry</button></div>';
    });
  });
}else{
  loadData();
  render();
}
</script>
